<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio PWA</title>

<link href='https://use.fontawesome.com/releases/v6.4.0/css/all.css' rel='stylesheet'/>
<link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css' rel='stylesheet'/>

<style>
body { font-family: Arial; margin:0; padding:20px; background:#f5f5f5; }

.open-modal-btn {
    background:#1180bd;
    color:white;
    border:none;
    border-radius:50px;
    padding:16px 32px;
    font-weight:700;
    cursor:pointer;
}

/* ===== TU MODAL ===== */
.socnas-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #1180bd;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999999;
}

.modal-wrapper {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    position: relative;
}

.modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 30px;
    background: white;
    border: none;
    cursor: pointer;
    font-size: 22px;
}

.logo-container {
    display:flex;
    justify-content:center;
    padding:20px;
}

.logo-image {
    width: 250px;
    max-width: 90%;
}

.modal-left {
    text-align:center;
}

.app-mockup {
    max-width: 90%;
}

.modal-right {
    padding:20px;
    text-align:center;
}

.badge {
    display:inline-block;
    background:rgba(255,255,255,0.2);
    color:white;
    padding:10px 20px;
    border-radius:40px;
    margin-bottom:10px;
}

h1 {
    color:white;
}

.btn-install, .btn-web {
    display:block;
    margin:10px auto;
    padding:14px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    width:80%;
}

.btn-install { background:white; color:#1180bd; font-weight:bold; }
.btn-web { background:transparent; border:2px solid white; color:white; }
</style>
</head>

<body>

<h2>📱 Directorio PWA</h2>

<!-- WEB 1 -->
<div>
  <h3>Xataka</h3>
  <button class="open-modal-btn"
    data-title="Xataka"
    data-url="https://xataka.com"
    data-logo="https://via.placeholder.com/200">
    INSTALAR
  </button>
</div>

<!-- WEB 2 -->
<div>
  <h3>El País</h3>
  <button class="open-modal-btn"
    data-title="El País"
    data-url="https://elpais.com"
    data-logo="https://via.placeholder.com/200">
    INSTALAR
  </button>
</div>

<!-- ===== TU MODAL ORIGINAL ===== -->
<div class='socnas-overlay' id='socnasOverlay'>

    <div class='modal-wrapper'>

        <button class='modal-close' id='closeSocnasModal'>X</button>

        <div class='logo-container'>
            <img class='logo-image' id="logoImage"
            src='https://via.placeholder.com/200'/>
        </div>

        <div class='modal-right'>

            <span class='badge' id="badgeText">
                INSTALA LA PWA
            </span>

            <h1 id="titleText">APP</h1>

            <button class="btn-install">
                INSTALAR APP
            </button>

            <button class="btn-web" id="socnasWebBtn">
                ENTRAR A LA WEB
            </button>

        </div>
    </div>
</div>

<script>
let currentURL = "";

// abrir modal desde cualquier web del directorio
document.querySelectorAll('.open-modal-btn').forEach(btn => {
    btn.addEventListener('click', function() {

        const title = this.dataset.title;
        const url = this.dataset.url;
        const logo = this.dataset.logo;

        currentURL = url;

        document.getElementById('titleText').innerText = title;
        document.getElementById('logoImage').src = logo;
        document.getElementById('badgeText').innerText = "INSTALA LA PWA DE " + title;

        document.getElementById('socnasOverlay').style.display = 'flex';
    });
});

// cerrar modal
document.getElementById('closeSocnasModal').onclick = function() {
    document.getElementById('socnasOverlay').style.display = 'none';
};

// entrar web
document.getElementById('socnasWebBtn').onclick = function() {
    window.open(currentURL, '_blank');
};
</script>

</body>
</html>
