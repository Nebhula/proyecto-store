<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PWA Store</title>

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

h1 { margin-top: 20px; }

input {
  padding: 10px;
  width: 80%;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

.card {
  background: #1c1c1c;
  margin: 10px auto;
  padding: 15px;
  width: 280px;
  border-radius: 12px;
}

img {
  width: 70px;
  border-radius: 12px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #222;
  padding: 20px;
  border-radius: 12px;
  max-width: 300px;
}

.close {
  background: red;
  color: white;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🔥 Mi PWA Store</h1>

<input id="search" placeholder="Buscar apps...">

<div id="apps"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2>📲 Instalar App</h2>
    <p id="msg"></p>

    <button onclick="openApp()">Ir a la web</button>
    <br>

    <button class="close" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>
const apps = [
  {
    name: "Blog 1",
    url: "https://tu-blog1.blogspot.com",
    icon: "https://via.placeholder.com/100",
    desc: "Noticias"
  },
  {
    name: "Blog 2",
    url: "https://tu-blog2.blogspot.com",
    icon: "https://via.placeholder.com/100",
    desc: "Tienda"
  }
];

let selectedApp = "";

function detectBrowser() {
  const ua = navigator.userAgent.toLowerCase();

  if (/iphone|ipad|ipod/.test(ua)) {
    return "📱 iPhone: Pulsa compartir → Añadir a pantalla de inicio";
  }

  if (ua.includes("android")) {
    return "🤖 Android: Menú ⋮ → Instalar app o Añadir a inicio";
  }

  return "💻 Pulsa instalar en el navegador si aparece opción";
}

function render(list) {
  const container = document.getElementById("apps");
  container.innerHTML = "";

  list.forEach(app => {
    container.innerHTML += `
      <div class="card">
        <img src="${app.icon}">
        <h3>${app.name}</h3>
        <p>${app.desc}</p>
        <button onclick="install('${app.url}')">
          Instalar
        </button>
      </div>
    `;
  });
}

function install(url) {
  selectedApp = url;

  document.getElementById("msg").innerText = detectBrowser();
  document.getElementById("modal").style.display = "flex";
}

function openApp() {
  window.open(selectedApp, "_blank");
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = apps.filter(a =>
    a.name.toLowerCase().includes(val)
  );

  render(filtered);
});

render(apps);
</script>

</body>
</html>
