<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PWA Store</title>

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

h1 { margin-top: 20px; }

input {
  padding: 10px;
  width: 80%;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

.card {
  background: #1c1c1c;
  margin: 10px auto;
  padding: 15px;
  width: 280px;
  border-radius: 12px;
}

img {
  width: 70px;
  border-radius: 12px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  color: white;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.modal-content {
  max-width: 300px;
  background: #222;
  padding: 20px;
  border-radius: 12px;
}

.close {
  margin-top: 10px;
  background: red;
  color: white;
}
</style>
</head>

<body>

<h1>🔥 Mi PWA Store</h1>

<input id="search" placeholder="Buscar apps...">

<div id="apps"></div>

<!-- MODAL INSTALACIÓN -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>📲 Instalar App</h2>
    <p id="instructions"></p>
    <button class="close" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>
const apps = [
  {
    name: "Blog Noticias",
    url: "https://tu-blog1.blogspot.com",
    icon: "https://via.placeholder.com/100",
    desc: "Noticias diarias",
    category: "blog"
  },
  {
    name: "Tienda Demo",
    url: "https://tu-blog2.blogspot.com",
    icon: "https://via.placeholder.com/100",
    desc: "Ecommerce simple",
    category: "tienda"
  }
];

const container = document.getElementById("apps");
const search = document.getElementById("search");
const modal = document.getElementById("modal");
const instructions = document.getElementById("instructions");

function render(list) {
  container.innerHTML = "";

  list.forEach(app => {
    container.innerHTML += `
      <div class="card">
        <img src="${app.icon}">
        <h3>${app.name}</h3>
        <p>${app.desc}</p>
        <small>${app.category}</small><br>
        <button onclick="openApp('${app.url}')">
          Abrir / Instalar
        </button>
      </div>
    `;
  });
}

function openApp(url) {
  // abre la web del cliente
  window.open(url, "_blank");

  // muestra modal de instalación
  instructions.innerHTML = `
    1. Abre la web<br>
    2. Busca "Añadir a pantalla de inicio"<br>
    3. O botón "Instalar app" en el navegador
  `;

  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
}

// buscador
search.addEventListener("input", e => {
  const value = e.target.value.toLowerCase();

  const filtered = apps.filter(app =>
    app.name.toLowerCase().includes(value) ||
    app.category.toLowerCase().includes(value)
  );

  render(filtered);
});

// init
render(apps);
</script>

</body>
</html>
